version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Pass your production env vars here if needed
      - SPRING_PROFILES_ACTIVE=prod
      - FIREBASE_CONFIG_PATH=/app/config/firebase-service-account.json
    volumes:
      # Mount secrets or config if necessary
      - ./backend/src/main/resources/config:/app/config

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    # If the frontend needs to talk to the backend, it will use 'backend:8080' internally
    # Or, in a real production, you might set the base URL of the API in the build step via VITE_API_URL
